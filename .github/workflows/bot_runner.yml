name: Hourly Bluesky Bot

on:
  schedule:
    - cron: '13 * * * *' # Runs at 13 minutes past the hour (Minute 13)
  workflow_dispatch: # Allows you to trigger it manually by clicking a button

permissions:
  contents: write # Allows the bot to save the replied_posts.txt file back to the repo

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the Python Script
        env:
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
        run: python bot.py

      - name: Save replied posts history
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add replied_posts.txt
          # The '|| exit 0' prevents the action from failing if no new replies were added
          git commit -m "Update replied posts history" || exit 0
          git push
